interface:
  display_name: "需求闭环设计器"
  short_description: "用于需求闭环、规则明确与Q台账回填。"
  default_prompt: "触发词示例：需求闭环、需求完善、规则明确、逻辑闭环、Q台账、close-loop、final-check。根据输入自动选择 `draft/close-loop/final-check` 模式。执行流程遵循 `SKILL.md`；输出结构、章节边界与字段规则遵循 `assets/requirements-closure-template-backend.md`；问题分类遵循 `references/ambiguity-rules.md`；闭环完成度、`CL-xx` 检查项、`U/Q` 状态合法性与回填判定统一遵循 `references/close-loop-checklist.md`。除引用编号外，不在多个文件重复解释同一规则。最终交付不输出模板提示性文字。"
